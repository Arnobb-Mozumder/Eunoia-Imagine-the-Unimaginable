<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description"
    content="Arnob Mozumder — Game Developer, 3D Artist & Creative Writer. Explore games, 3D models, animations, and writings." />
  <title>Arnob Mozumder | Creative Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles/variables.css" />
  <link rel="stylesheet" href="/src/styles/global.css" />
  <link rel="stylesheet" href="/src/styles/components.css" />
  <link rel="stylesheet" href="/src/styles/pages.css" />
  <link rel="stylesheet" href="/src/styles/admin.css" />
  <link rel="stylesheet" href="/src/styles/customizer.css" />
  <link rel="stylesheet" href="/src/styles/mode-selector.css" />
  <link rel="stylesheet" href="/src/styles/fun-mode.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>

<body>
  <!-- GLOBAL PARTICLE BACKGROUND (Standard Mode) -->
  <canvas id="particle-background-canvas" class="particle-background-canvas"></canvas>
  
  <!-- SPACE BACKGROUND (Intro Screen) -->
  <canvas id="space-background-canvas" class="particle-background-canvas" style="z-index: 9990; pointer-events: none;"></canvas>

  <!-- MODE SELECTOR -->
  <div id="mode-selector" class="mode-selector">
    <div class="mode-selector-content">
      <div class="welcome-heading">
        <div class="eunoia-logo-circle">
          <img src="/static/eunioaa.png" alt="Eunoia Logo">
        </div>
        <h2>Welcome to Eunoia</h2>
      </div>
      <h1 class="mode-title">Choose Your Experience</h1>
      <div class="mode-cards rectangular-mode-cards">
        <div id="standard-mode-btn" class="mode-card glass rectangular">
          <h3>Standard Mode</h3>
        </div>
        <div id="fun-mode-btn" class="mode-card glass rectangular">
          <h3>Fun Mode</h3>
        </div>
      </div>
    </div>
  </div>

  <div id="app" class="hidden">
    <!-- Navbar -->
    <nav id="navbar" class="navbar">
      <div class="nav-inner">
        <a href="#/" class="nav-logo" id="nav-logo-link">
          <img src="/static/eunioaa.png" alt="Eunoia" class="nav-logo-img">
        </a>
        <div class="nav-links" id="nav-links">
          <a href="#/" class="nav-link" data-page="home">Home</a>
          <a href="#/games" class="nav-link" data-page="games">Games</a>
          <a href="#/models" class="nav-link" data-page="models">3D Models</a>
          <a href="#/animations" class="nav-link" data-page="animations">Animations</a>
          <a href="#/writings" class="nav-link" data-page="writings">Writings</a>
          <a href="#/messages" class="nav-link" data-page="messages">Chithi</a>
          <a href="#/admin" class="nav-link" data-page="admin" style="color: #f59e0b; font-weight: 600;">⚙️ Admin</a>
        </div>
        <div class="nav-actions">
          <button id="admin-btn" class="admin-btn" aria-label="Admin inbox" title="Admin Inbox">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="5" width="18" height="14" rx="2" />
              <polyline points="3,5 12,13 21,5" />
            </svg>
            <span id="msg-badge" class="msg-badge hidden">0</span>
          </button>
          <button id="theme-customizer-btn" class="theme-customizer-btn" title="Customize Theme">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" />
              <path
                d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" />
            </svg>
          </button>
          <button id="hamburger" class="hamburger" aria-label="Menu">
            <span></span><span></span><span></span>
          </button>
        </div>
      </div>
    </nav>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="mobile-menu">
      <a href="#/" class="mobile-link" data-page="home">Home</a>
      <a href="#/games" class="mobile-link" data-page="games">Games</a>
      <a href="#/models" class="mobile-link" data-page="models">3D Models</a>
      <a href="#/animations" class="mobile-link" data-page="animations">Animations</a>
      <a href="#/writings" class="mobile-link" data-page="writings">Writings</a>
      <a href="#/messages" class="mobile-link" data-page="messages">Chithi</a>
      <a href="#/admin" class="mobile-link" data-page="admin" style="color: #f59e0b; font-weight: 600;">⚙️ Admin</a>
    </div>

    <!-- Page Container -->
    <main id="page-container" class="page-container"></main>

    <!-- Admin Modal -->
    <div id="admin-modal" class="modal-overlay hidden">
      <div class="modal-box glass">
        <button class="modal-close" id="admin-modal-close">✕</button>
        <h2 class="modal-title">🖂 Chithi Inbox</h2>
        <div id="admin-auth" class="admin-auth">
          <p class="admin-hint">Enter your secret key to view messages</p>
          <input type="password" id="admin-password" class="admin-input" placeholder="Secret key…" />
          <button id="admin-login-btn" class="btn btn-primary">Unlock Inbox</button>
          <p id="admin-error" class="admin-error hidden">Wrong key. Try again.</p>
        </div>
        <div id="admin-inbox" class="admin-inbox hidden">
          <div class="inbox-header">
            <span id="inbox-count" class="inbox-count">0 messages</span>
            <button id="clear-inbox-btn" class="btn-ghost-sm">Clear All</button>
          </div>
          <div id="messages-list" class="messages-list"></div>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast hidden"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
